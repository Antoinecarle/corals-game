<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pirate MMO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
    #game-container { width: 100%; height: 100%; }
    #login-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0a1a; z-index: 100;
      font-family: 'Segoe UI', sans-serif; color: #e0d5c0;
    }
    #login-screen h1 { font-size: 3rem; margin-bottom: 0.5rem; color: #d4a853; }
    #login-screen p { margin-bottom: 2rem; opacity: 0.6; }
    #login-screen input {
      padding: 12px 20px; font-size: 1.1rem; border: 2px solid #d4a853;
      background: #1a1a2e; color: #e0d5c0; border-radius: 8px;
      outline: none; width: 280px; text-align: center;
    }
    #login-screen input::placeholder { color: #666; }
    #login-screen button {
      margin-top: 1rem; padding: 12px 40px; font-size: 1.1rem;
      background: #d4a853; color: #0a0a1a; border: none; border-radius: 8px;
      cursor: pointer; font-weight: bold;
    }
    #login-screen button:hover { background: #e0b960; }
    #loading-text { display: none; margin-top: 1rem; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="login-screen">
    <h1>Pirate MMO</h1>
    <p>AI-First Isometric Adventure</p>
    <input type="text" id="player-name" placeholder="Enter your pirate name..." maxlength="20" autocomplete="off" />
    <button id="play-btn" onclick="startGame()">Set Sail!</button>
    <p id="loading-text">Connecting to the world...</p>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    function startGame() {
      const name = document.getElementById('player-name').value.trim();
      if (!name) return;
      document.getElementById('play-btn').style.display = 'none';
      document.getElementById('loading-text').style.display = 'block';
      window.dispatchEvent(new CustomEvent('game-login', { detail: { name } }));
    }
    document.getElementById('player-name').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startGame();
    });
  </script>
</body>
</html>
